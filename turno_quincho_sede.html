<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Disponibilidad Quincho - STM</title>
    <link rel="icon" type="image/png" href="logo nuevo.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            --stm-primary: #4f46e5;
            --stm-accent: #f59e0b;
            --nav-bg: #111827;
            --text-dark: #1e293b;
            --glass: rgba(255, 255, 255, 0.85);
            --bg-body: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body.dark-mode {
            --stm-primary: #818cf8;
            --text-dark: #f1f5f9;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --glass: rgba(30, 41, 59, 0.85);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            color: var(--text-dark);
            overflow-x: hidden;
        }

        header {
            padding: 40px 20px 20px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-box {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 14px;
            padding: 6px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .welcome-msg h1 {
            margin: 0;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .welcome-msg p {
            margin: 0;
            font-size: 1.05rem;
            opacity: 0.8;
            font-weight: 600;
            color: var(--stm-primary);
        }

        .container {
            padding: 24px 16px 140px;
            max-width: 600px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* --- AVAILABILITY CARDS --- */
        .day-card {
            background: white;
            border-radius: 28px;
            padding: 25px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            gap: 12px;
            animation: fadeInUp 0.5s ease-out forwards;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.8);
            position: relative;
            transition: all 0.3s ease;
        }

        .day-card:active {
            transform: scale(0.95);
        }

        body.dark-mode .day-card {
            background: #1e293b;
            border-color: #334155;
        }

        .day-ico {
            width: 50px;
            height: 50px;
            border-radius: 16px;
            background: #f0fdf4;
            color: #16a34a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        body.dark-mode .day-ico {
            background: #064e3b;
            color: #34d399;
        }

        .day-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .day-title {
            font-size: 1rem;
            font-weight: 800;
            margin: 0;
            color: #334155;
            line-height: 1.2;
        }

        body.dark-mode .day-title {
            color: white;
        }

        .day-subtitle {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 700;
            text-transform: uppercase;
        }

        .status-badge {
            background: #f0fdf4;
            color: #16a34a;
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 800;
        }

        .status-badge.libre {
            animation: status-blink 1.5s infinite ease-in-out;
        }

        @keyframes status-blink {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.95); }
        }

        /* --- OCCUPIED STATE --- */
        .day-card.occupied {
            background: #fff1f2;
            border-bottom: 6px solid #ef4444;
            cursor: default;
        }
        body.dark-mode .day-card.occupied {
            background: #451a1a;
            border-color: #ef4444;
        }
        .day-card.occupied .day-ico {
            background: #fee2e2;
            color: #ef4444;
        }
        body.dark-mode .day-card.occupied .day-ico {
            background: #7f1d1d;
            color: #f87171;
        }
        .day-card.occupied .status-badge {
            background: #ef4444;
            color: white;
        }

        .btn-confirm {
            background: linear-gradient(135deg, var(--stm-primary) 0%, #6366f1 100%);
            color: white;
            border-radius: 20px;
            padding: 16px;
            font-weight: 800;
            border: none;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.35);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05rem;
            letter-spacing: 0.5px;
        }

        .btn-confirm:active {
            transform: scale(0.94) translateY(2px);
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.2);
        }

        .btn-danger-outline {
            border: 2px solid #ef4444;
            color: #ef4444;
            background: white;
            border-radius: 20px;
            padding: 16px;
            font-weight: 800;
            width: 100%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.05rem;
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.1);
        }

        body.dark-mode .btn-danger-outline {
            background: transparent;
        }

        .btn-danger-outline:active {
            transform: scale(0.94) translateY(2px);
            background: #fef2f2;
        }

        body.dark-mode .btn-danger-outline:active {
            background: rgba(239, 68, 68, 0.1);
        }

        .footer-action-buttons {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
            padding-top: 10px;
        }

        /* --- BOT & NAV --- */
        .fab-bot {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 60px;
            height: 60px;
            background: #6366f1 !important;
            color: white !important;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            z-index: 1001;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            animation: bounceBot 3s infinite;
        }

        @keyframes bounceBot {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        .nav-home-pulse i {
            animation: home-blink 3s infinite ease-in-out;
        }

        @keyframes home-blink {

            0%,
            100% {
                color: #64748b;
                transform: scale(1);
            }

            50% {
                color: white;
                transform: scale(1.1);
            }
        }

        .bot-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(8px);
            z-index: 1050;
            /* Aumentado pero debajo de SweetAlert */
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .bot-modal.active {
            visibility: visible;
            opacity: 1;
        }

        .bot-content {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: white;
            border-top-left-radius: 30px;
            border-top-right-radius: 30px;
            padding: 30px 20px 40px;
            transform: translateY(100%);
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            max-height: 85vh;
            overflow-y: auto;
        }

        body.dark-mode .bot-content {
            background: #1e293b;
            color: white;
        }

        .bot-modal.active .bot-content {
            transform: translateY(0);
        }

        .bottom-nav {
            position: fixed;
            bottom: 25px;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 25px);
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 40px);
            max-width: 380px;
            height: 72px;
            background: rgba(17, 24, 39, 0.95) !important;
            backdrop-filter: blur(10px);
            border-radius: 35px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            z-index: 1040;
            padding: 0 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-btn {
            text-decoration: none;
            color: #64748b;
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .nav-btn:active {
            transform: scale(0.9);
        }

        .nav-btn.active {
            color: white;
            background: var(--stm-primary);
            border-radius: 50%;
            transform: translateY(-12px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
        }

        #loader-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        body.dark-mode #loader-wrapper {
            background: #0f172a;
        }

        .loader-logo {
            width: 100px;
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .bot-input {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border-radius: 18px;
            border: 2px solid #f1f5f9;
            background: #f8fafc;
            font-family: inherit;
            font-size: 1rem;
            color: var(--text-dark);
            outline: none;
        }

        body.dark-mode .bot-input {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }
    </style>
</head>

<body>

    <div id="loader-wrapper">
        <img src="logo nuevo.png" class="loader-logo" alt="STM">
    </div>

    <header>
        <div class="header-box">
            <div class="logo-box"><img src="logo nuevo.png" alt="STM"></div>
            <div class="welcome-msg">
                <h1 id="usrGreeting">¡Hola!</h1>
                <p id="usrDisplayName">Cargando...</p>
            </div>
        </div>
        <div style="margin-top: 15px;">
            <a href="quincho.html" style="display: flex; align-items: center; gap: 10px; text-decoration: none; background: rgba(79, 70, 229, 0.08); padding: 12px 20px; border-radius: 15px; color: var(--stm-primary); font-weight: 800; font-size: 0.9rem; width: fit-content;">
                <i class="fa-solid fa-arrow-left"></i> VOLVER ATRÁS

    <div class="container" id="daysList" style="padding-top: 10px;">
        <!-- Los días se cargan aquí -->
    </div>

    <div id="emptyMsg" class="container text-center py-5" style="display: none; grid-column: 1 / -1; text-align: center;">
        <i class="fa-solid fa-calendar-xmark fs-1 opacity-25 mb-3"></i>
        <p class="fw-bold text-muted">No hay fechas disponibles próximas.</p>
    </div>

    <!-- BOT & NAV -->
    <div class="fab-bot" id="fabBotIcon" onclick="toggleBot(true)"><i class="fa-solid fa-robot"></i></div>

    <div class="bot-modal" id="modalAction" onclick="if(event.target == this) toggleAction(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;">
            </div>
            <h2 id="modalActionTitle"
                style="font-weight: 800; font-size: 1.3rem; margin-bottom:10px; color: var(--stm-primary); text-align: center;">
                Solicitar
                Reserva</h2>
            <div id="modalActionBody" style="margin-bottom: 25px;"></div>
            <div id="modalActionFooter"></div>
            <button onclick="toggleAction(false)"
                style="width: 100%; margin-top:10px; padding: 10px; border: none; background: transparent; color: #64748b; font-weight: 600;">Cerrar</button>

    <div class="bot-modal" id="modalBot" onclick="if(event.target == this) toggleBot(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;">
            </div>

                    style="position:absolute; left:18px; top:50%; transform:translateY(-50%); color:var(--stm-primary)"></i>
                <input type="text" class="bot-input" placeholder="¿En qué puedo ayudarte?" id="botSearch">

        </div>

    <nav class="bottom-nav">
        <a href="opciones.html" class="nav-btn nav-home-pulse"><i class="fa-solid fa-house"></i></a>

        <a href="#" class="nav-btn" onclick="toggleUser(true)"><i class="fa-solid fa-user"></i></a>
        <a href="#" class="nav-btn" onclick="toggleSettings(true)"><i class="fa-solid fa-gear"></i></a>
    </nav>

    <!-- MODALS CONFIG & USER -->
    <div class="bot-modal" id="modalConfig" onclick="if(event.target == this) toggleSettings(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;">
            </div>
            <h2 style="font-weight: 800; font-size: 1.3rem; margin-bottom:20px; color: var(--stm-primary);">
                Configuración</h2>
            <div style="display: flex; flex-direction: column; gap: 15px;">
                <div style="display: flex; justify-content: space-between; align-items: center;"><span>Modo
                        Oscuro</span><input type="checkbox" id="checkDark" onchange="applyConfig('dark', this.checked)">
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center;"><span>Ver Asistente
                        Bot</span><input type="checkbox" id="checkBot" onchange="applyConfig('bot', this.checked)">
                </div>

            <button onclick="toggleSettings(false)"
                style="margin-top: 30px; width: 100%; padding: 15px; border-radius: 15px; border: none; background: #f1f5f9; font-weight: 800;">Cerrar</button>
        </div>

    <div class="bot-modal" id="modalUser" onclick="if(event.target == this) toggleUser(false)">
        <div class="bot-content">
            <div style="width: 40px; height: 5px; background: #e2e8f0; border-radius: 10px; margin: -10px auto 20px;">
            </div>

            </h2>

                <input type="password" id="newPass" class="bot-input" placeholder="Nueva Contraseña"
                    style="padding-left:20px">

                    style="padding-left:20px">

                    Contraseña</button>

                <button onclick="logout()"
                    style="padding: 15px; border-radius: 18px; border: 2px solid #ef4444; background: transparent; color: #ef4444; font-weight: 800; cursor: pointer;">Cerrar
                    Sesión</button>
                <button onclick="toggleUser(false)"
                    style="padding: 15px; border: none; background: transparent; color: #64748b; font-weight: 600; cursor: pointer;">Cancelar</button>
            </div>

    <script>
        //mismo backend de dashboard
        const URL_SCRIPT = "https://script.google.com/macros/s/AKfycbyeZdpDz-pMqaHUd2cq0_L9wXLw9N6HoHnSz0m9kPaOxEUjdx2O-Ru3fens5gvbN06sJA/exec";

        function qFormatDate(date) {
            const d = qParseDate(date);
            if (isNaN(d.getTime())) return "";
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function qFormatSheetDate(date) {
            const d = qParseDate(date);
            if (isNaN(d.getTime())) return "";
            const day = String(d.getDate()).padStart(2, '0');
            const month = String(d.getMonth() + 1).padStart(2, '0');
            return `${day}/${month}/${d.getFullYear()}`;
        }

        function qParseDate(val) {
            if (!val) return new Date(NaN);
            if (val instanceof Date) return val;
            const s = val.toString().trim();
            // 1. Intentar DD/MM/YYYY
            const p1 = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
            if (p1) return new Date(parseInt(p1[3]), parseInt(p1[2]) - 1, parseInt(p1[1]));
            // 2. Intentar YYYY-MM-DD
            const p2 = s.match(/^(\d{4})[-/](\d{1,2})[-/](\d{1,2})/);
            if (p2) return new Date(parseInt(p2[1]), parseInt(p2[2]) - 1, parseInt(p2[3]));

            return new Date(s);
        }

        async function loadAvailableDays() {
            let config = {};
            const loader = document.getElementById('loader-wrapper');
            loader.style.display = 'flex';
            loader.style.opacity = '1';
            
            const urlParams = new URLSearchParams(window.location.search);
            const userSede = (urlParams.get('sede') || 'Sede').toLowerCase();

            try {
                if (URL_SCRIPT) {
                    const res = await fetch(URL_SCRIPT + "?_=" + Date.now());
                    const data = await res.json();

                    if (data.FECHAS_QUINCHO) {
                        data.FECHAS_QUINCHO.forEach(row => {
                            if (!row.fecha) return;
                            let rowLugar = (row.Lugar || row.lugar || 'Sede').toString().toLowerCase();
                            if (rowLugar !== userSede) return;
                            
                            const iso = qFormatDate(row.fecha);
                            config[iso] = {
                                enabled: true,
                                occupied: ((row.estado || "").toString().trim().toUpperCase() === 'OCUPADO' ? 1 : 0),
                                backend_id: row.id
                            };
                        });
                    }

                    // Verificar si el usuario ya tiene una reserva activa para ESE quincho
                    if (data.SOLICITUD_QUINCHO) {
                        const myUserId = localStorage.getItem('usrID');
                        const myRequest = data.SOLICITUD_QUINCHO.find(s => {
                            let solLugar = (s.Lugar || s.lugar || 'Sede').toString().toLowerCase();
                            return s.id_user && s.id_user.toString() === myUserId.toString() &&
                                (s.pendiente.toString().toUpperCase() === 'SI' || (s.pendiente.toString().toUpperCase() === 'NO' && qFormatDate(s.fecha_solicitada) >= qFormatDate(new Date())));
                        });

                        if (myRequest) {
                            const isPending = myRequest.pendiente.toString().toUpperCase() === 'SI';
                            const isoBooked = qFormatDate(myRequest.fecha_solicitada);
                            const dateId = config[isoBooked] ? config[isoBooked].backend_id : null;
                            const solLugar = (myRequest.Lugar || myRequest.lugar || 'Sede').toString().toUpperCase();

                            localStorage.setItem('my_active_booking', JSON.stringify({
                                id: myRequest.id, // ID real de la fila en BD
                                iso: isoBooked,
                                date: qFormatSheetDate(myRequest.fecha_solicitada),
                                status: isPending ? 'PENDIENTE' : 'CONFIRMADA',
                                date_id: dateId,
                                lugar: solLugar
                            }));

                            // Notificación automática al entrar usando el modal de acción
                            setTimeout(() => {
                                handleDaySelection(isoBooked, "", qFormatSheetDate(myRequest.fecha_solicitada));
                            }, 800);

                        } else {
                            localStorage.removeItem('my_active_booking');
                        }
                    }
                }
            } catch (e) {
                console.error("Error cargando disponibilidad:", e);
                config = JSON.parse(localStorage.getItem('stm_quincho_config')) || {};
            }
            renderList(config);
        }

        function renderList(config) {
            const listDiv = document.getElementById('daysList');
            const emptyMsg = document.getElementById('emptyMsg');
            listDiv.innerHTML = '';

            const todayStr = qFormatDate(new Date());

            let found = false;
            const sortedDates = Object.keys(config).sort();

            sortedDates.forEach((iso, index) => {
                const dateObj = qParseDate(iso);
                const isoNormalized = qFormatDate(dateObj);

                // Mostrar solo fechas futuras o hoy que estén habilitadas
                if (isoNormalized >= todayStr && config[iso].enabled) {
                    found = true;
                    const isOccupied = config[iso].occupied === 1;
                    const dayNames = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
                    const name = dayNames[dateObj.getDay()];
                    const dateFormatted = qFormatSheetDate(dateObj);

                    const card = document.createElement('div');
                    card.className = `day-card ${isOccupied ? 'occupied' : ''}`;
                    card.style.animationDelay = `${index * 0.05}s`;
                    
                    if (!isOccupied) {
                        card.onclick = () => handleDaySelection(iso, name, dateFormatted, config[iso].backend_id);
                    }

                    card.innerHTML = `
                        <div class="day-ico"><i class="fa-solid ${isOccupied ? 'fa-calendar-xmark' : 'fa-calendar-check'}"></i></div>
                        <div class="day-info">
                            <div class="day-subtitle">${name}</div>
                            <h3 class="day-title">${dateFormatted}</h3>
                        </div>
                        <span class="status-badge ${isOccupied ? '' : 'libre'}">${isOccupied ? 'OCUPADO' : 'LIBRE'}</span>
                    `;
                    listDiv.appendChild(card);
                }
            });

            if (!found) emptyMsg.style.display = 'block';
            else emptyMsg.style.display = 'none';

            const loader = document.getElementById('loader-wrapper');
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 500);
        }

        function handleDaySelection(iso, name, date, backendId) {
            const activeBookingStr = localStorage.getItem('my_active_booking');
            const title = document.getElementById('modalActionTitle');
            const body = document.getElementById('modalActionBody');
            const footer = document.getElementById('modalActionFooter');

            if (activeBookingStr) {
                const b = JSON.parse(activeBookingStr);
                title.innerText = "¡Reserva Confirmada!";

                body.innerHTML = `
                    <div style="display: flex; justify-content: center; margin-bottom: 1.5rem;">
                        <div class="animate__animated animate__pulse animate__infinite" 
                             style="display: flex; align-items: center; justify-content: center; width: 80px; height: 80px; font-size: 4rem; color: #f59e0b;">
                            <i class="fa-solid fa-triangle-exclamation"></i>
                        </div>
                    </div>
                    <div style="text-align: center;">
                        <p style="font-size: 1.1rem; color: var(--text-dark);">Ya tienes una reserva <b>CONFIRMADA</b> para el día <b>${b.date}</b> para el lugar <b>${b.lugar || 'SEDE'}</b>.</p>
                        <p class="text-muted small">Para elegir una nueva fecha o realizar otro trámite, primero debes gestionar tu solicitud actual.</p>
                    </div>
                `;

                footer.innerHTML = `
                    <div class="footer-action-buttons">
                        <button class="btn-confirm" onclick="toggleAction(false)">
                            <i class="fa-solid fa-shield-halved fs-5"></i> MANTENER RESERVA
                        </button>
                        <button class="btn-danger-outline" onclick="cancelMyBooking('${b.id}')">
                            <i class="fa-solid fa-triangle-exclamation fs-5"></i> ANULAR RESERVA
                        </button>
                    </div>
                `;
            } else {
                title.innerText = "Confirmar Reserva";
                body.innerHTML = `<p class="text-center" style="font-size: 1.1rem;">¿Deseas confirmar tu reserva para el quincho el día <b>${name} ${date}</b>?</p>`;
                footer.innerHTML = `
                    <div class="footer-action-buttons">
                        <button class="btn-confirm" onclick="confirmMyBooking('${iso}', '${date}', '${backendId}')">
                            <i class="fa-solid fa-calendar-check fs-5"></i> CONFIRMAR RESERVA
                        </button>
                    </div>
                `;
            }
            toggleAction(true);
        }

        async function confirmMyBooking(iso, date, backendId) {
            const userId = localStorage.getItem('usrID');
            const fullName = localStorage.getItem('usrFullName') || "";
            const parts = fullName.split(' ');
            const nombre = parts[0] || "";
            const apellido = parts.slice(1).join(' ') || "";

            const urlParams = new URLSearchParams(window.location.search);
            const userSede = urlParams.get('sede') || 'Sede';

            Swal.fire({
                title: 'Procesando reserva...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const payload = {
                    id_user: userId,
                    Nombre: nombre,
                    nombre: nombre,
                    Apellido: apellido,
                    apellido: apellido,
                    fecha_solicitada: date,
                    fecha_actual: qFormatSheetDate(new Date()),
                    lugar: userSede,
                    pendiente: 'NO'
                };

                const res = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'CREATE',
                        sheet: 'SOLICITUD_QUINCHO',
                        data: payload
                    })
                });

                const result = await res.json();
 
                if (result.status === 'SUCCESS') {
                    // Actualizar estado de la fecha a OCUPADO en FECHAS_QUINCHO
                    if (backendId) {
                        await fetch(URL_SCRIPT, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'UPDATE',
                                sheet: 'FECHAS_QUINCHO',
                                id: backendId,
                                data: { estado: 'OCUPADO' }
                            })
                        });
                    }

                    // Enviar notificación persistente al usuario
                    await fetch(URL_SCRIPT, {
                        method: 'POST',
                        body: JSON.stringify({
                            action: 'CREATE',
                            sheet: 'MENSAJES',
                            data: {
                                id_user: userId,
                                titulo: "Reserva de Quincho Recibida",
                                mensaje: "Su trámite de reserva para el quincho ha sido recibido y confirmado.",
                                fecha: new Date().toLocaleString()
                            }
                        })
                    });

                    toggleAction(false);
                    Swal.fire({
                        icon: 'success',
                        title: '¡Reserva Confirmada!',
                        text: 'Tu reserva para el quincho ha sido procesada con éxito.',
                        confirmButtonColor: 'var(--stm-primary)'
                    });
                    loadAvailableDays();
                } else {
                    throw new Error(result.message || 'Error desconocido');
                }

            } catch (e) {
                console.error("Error confirmando reserva:", e);
                Swal.fire('Error', 'No se pudo enviar la solicitud. Intente nuevamente.', 'error');
            }
        }

        async function cancelMyBooking(idSolicitud) {
            const userId = localStorage.getItem('usrID');
            const b = JSON.parse(localStorage.getItem('my_active_booking') || '{}');

            Swal.fire({
                title: 'Anulando solicitud...',
                allowOutsideClick: false,
                didOpen: () => Swal.showLoading()
            });

            try {
                const res = await fetch(URL_SCRIPT, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: 'CANCEL_QUINCHO',
                        bookingId: idSolicitud,
                        dateId: b.date_id, // ID de la fecha para liberar
                        userId: userId
                    })
                });

                const result = await res.json();

                if (result.status === 'SUCCESS') {
                    // Enviar mensaje de anulación al usuario
                    if (userId && userId != 0) {
                        await fetch(URL_SCRIPT, {
                            method: 'POST',
                            body: JSON.stringify({
                                action: 'CREATE',
                                sheet: 'MENSAJES',
                                data: {
                                    id_user: userId,
                                    titulo: "Reserva Anulada",
                                    mensaje: `Su reserva para el día ${b.date} ha sido anulada exitosamente. Deberá volver a solicitar la reserva nuevamente si así lo desea.`,
                                    fecha: new Date().toLocaleString()
                                }
                            })
                        });
                    }

                    localStorage.removeItem('my_active_booking');
                    toggleAction(false);
                    Swal.fire({
                        icon: 'success',
                        title: 'Gestión Anulada',
                        text: 'Tu solicitud ha sido eliminada correctamente.',
                        confirmButtonColor: 'var(--stm-primary)'
                    });
                    loadAvailableDays();
                } else {
                    throw new Error(result.message || 'Error al anular');
                }
            } catch (e) {
                console.error("Error anulando reserva:", e);
                Swal.fire('Error', 'No se pudo anular la solicitud. Intente nuevamente.', 'error');
            }
        }

        // --- BOT & UI LOGIC ---
        function toggleBot(s) { document.getElementById('modalBot').classList.toggle('active', s); }
        function toggleSettings(s) { document.getElementById('modalConfig').classList.toggle('active', s); }
        function toggleUser(s) { document.getElementById('modalUser').classList.toggle('active', s); }
        function toggleAction(s) { document.getElementById('modalAction').classList.toggle('active', s); }
        function applyConfig(k, v) {
            if (k === 'dark') { document.body.classList.toggle('dark-mode', v); localStorage.setItem('cfg_dark', v); }
            else if (k === 'bot') { document.getElementById('fabBotIcon').style.display = v ? 'flex' : 'none'; localStorage.setItem('cfg_bot', v); }
        }

        async function changePassword() {
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;
            if (!p1 || p1 !== p2) return Swal.fire('Error', 'Las contraseñas no coinciden', 'error');

            Swal.fire({ title: 'Procesando...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            // Simulación de cambio de contraseña
            setTimeout(() => {
                Swal.fire('Éxito', 'Contraseña actualizada correctamente', 'success');
                toggleUser(false);
            }, 1500);
        }

        function logout() { sessionStorage.clear(); localStorage.clear(); window.location.href = 'index.html'; }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const userSede = urlParams.get('sede') || 'Sede';
            document.title = "Disponibilidad Quincho - " + userSede.toUpperCase();

            loadAvailableDays();
            const cfgDark = localStorage.getItem('cfg_dark') === 'true';
            const cfgBot = localStorage.getItem('cfg_bot') !== 'false';
            document.body.classList.toggle('dark-mode', cfgDark);
            document.getElementById('checkDark').checked = cfgDark;
            document.getElementById('fabBotIcon').style.display = cfgBot ? 'flex' : 'none';
            document.getElementById('checkBot').checked = cfgBot;
            document.getElementById('usrDisplayName').innerText = localStorage.getItem('usrName') || "Afiliado STM";
            const h = new Date().getHours();
            document.getElementById('usrGreeting').innerText = h < 12 ? "¡Buen día!" : h < 20 ? "¡Buenas tardes!" : "¡Buenas noches!";
        };
    </script>
    <script src="stm-bot.js"></script>
</body>
