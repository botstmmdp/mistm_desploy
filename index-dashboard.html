<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Acceso Administrador - STM</title>
    <link rel="icon" type="image/png" href="logo nuevo.png">

    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" />

    <style>
        :root {
            --stm-primary: #4f46e5;
            --stm-secondary: #818cf8;
            --stm-dark: #1e293b;
            --bg-body: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }

        body.dark-mode {
            --stm-primary: #818cf8;
            --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-body);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--stm-dark);
            overflow: hidden;
        }

        .login-card {
            width: 100%;
            max-width: 400px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 32px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
            animation: fadeInDown 0.8s ease-out;
            margin: 20px;
        }

        body.dark-mode .login-card {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .logo-box {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 24px;
            padding: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.05);
            margin: 0 auto 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse-logo 2s infinite ease-in-out;
        }

        @keyframes pulse-logo {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.05);
            }
        }

        .logo-box img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 800;
            text-align: center;
            margin: 0 0 10px;
            letter-spacing: -0.5px;
        }

        p.subtitle {
            text-align: center;
            opacity: 0.6;
            font-size: 0.9rem;
            margin-bottom: 35px;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--stm-primary);
        }

        input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            border-radius: 18px;
            border: 2px solid rgba(0, 0, 0, 0.05);
            background: rgba(255, 255, 255, 0.7);
            font-family: inherit;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--stm-primary);
            background: white;
            box-shadow: 0 0 15px rgba(79, 70, 229, 0.1);
        }

        body.dark-mode input {
            background: rgba(15, 23, 42, 0.5);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        body.dark-mode input:focus {
            background: rgba(15, 23, 42, 0.8);
            border-color: var(--stm-secondary);
        }

        button {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: none;
            background: var(--stm-primary);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
        }

        button:active {
            transform: scale(0.97);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .error-msg {
            background: #fef2f2;
            border: 1px solid #fee2e2;
            color: #ef4444;
            padding: 12px;
            border-radius: 14px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: none;
            text-align: center;
            animation: shake 0.5s;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .loader-dots {
            display: none;
            gap: 5px;
        }

        .loader-dots span {
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            animation: dot-blink 1s infinite;
        }

        .loader-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loader-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes dot-blink {

            0%,
            100% {
                opacity: 0.2;
            }

            50% {
                opacity: 1;
            }
        }

        .stm-notify {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: white;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
            border: 1px solid #e2e8f0;
            z-index: 10000;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28);
            opacity: 0;
            pointer-events: none;
        }

        .stm-notify.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .stm-notify i {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--stm-primary);
            color: white;
            font-size: 0.8rem;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-label {
            display: block;
            text-align: center;
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--stm-primary);
            margin-bottom: 15px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <span class="admin-label">Panel de Control Administrativo</span>
        <div class="logo-box">
            <img src="logo nuevo.png" alt="STM Logo">
        </div>
        <h1>Acceso Gestor</h1>
        <p class="subtitle">Identifícate para gestionar la plataforma del STM</p>

        <div id="errorBox" class="error-msg"></div>

        <form id="loginForm">
            <div class="input-group">
                <i class="fa-solid fa-user-shield"></i>
                <input type="text" id="usrInput" placeholder="Usuario Admin" required>
            </div>
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="passInput" placeholder="Contraseña" required>
            </div>
            <button type="submit" id="loginBtn">
                <span id="btnText">Entrar al Tablero</span>
                <div id="loader" class="loader-dots"><span></span><span></span><span></span></div>
            </button>
        </form>
    </div>

    <script>
        const SHEET_ID = "16Y723omF3l38Ntq0MUSh-ZMYnRIvYmctrscidox5ktc";
        const GID = "597139795"; // TABLA USER
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&gid=${GID}`;

        const form = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const loader = document.getElementById('loader');
        const errorBox = document.getElementById('errorBox');

        // Redirección si ya hay sesión activa
        const currentPerm = sessionStorage.getItem('usrPermiso');
        const allowedRoles = ['ADMIN', 'PROVEEDURIA', 'FARMACIA', 'DEPORTE', 'CAPACITACION', 'QUINCHO'];

        if (sessionStorage.getItem('isLogged') === 'true' && allowedRoles.includes(currentPerm)) {
            window.location.href = 'dashboard.html';
        }

        // Check dark mode
        const isDark = localStorage.getItem('cfg_dark') === 'true';
        if (isDark) document.body.classList.add('dark-mode');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const usr = document.getElementById('usrInput').value.trim();
            const pass = document.getElementById('passInput').value.trim();

            setLoading(true);
            errorBox.style.display = "none";

            try {
                const res = await fetch(URL);
                const text = await res.text();
                const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));

                // Rows map to search credentials
                const users = json.table.rows.map(r => ({
                    id: r.c[0]?.v || "",
                    apellido: r.c[1]?.v || "",
                    nombre: r.c[2]?.v || "",
                    usuario: String(r.c[3]?.v || ""),
                    password: String(r.c[4]?.f || r.c[4]?.v || ""),
                    permiso: (r.c[5]?.v || "USER").toUpperCase()
                }));

                const found = users.find(u =>
                    u.usuario.toLowerCase() === usr.toLowerCase() &&
                    u.password === pass
                );

                if (found) {
                    const allowedRoles = ['ADMIN', 'PROVEEDURIA', 'FARMACIA', 'DEPORTE', 'CAPACITACION', 'QUINCHO'];
                    if (allowedRoles.includes(found.permiso)) {
                        // Success!
                        localStorage.setItem('isLogged', 'true');
                        localStorage.setItem('usrID', found.id);
                        localStorage.setItem('usrLogin', found.usuario);
                        localStorage.setItem('usrName', found.nombre);
                        localStorage.setItem('usrFullName', `${found.nombre} ${found.apellido}`);
                        localStorage.setItem('usrPermiso', found.permiso);

                        sessionStorage.setItem('isLogged', 'true');
                        sessionStorage.setItem('usrID', found.id);
                        sessionStorage.setItem('usrLogin', found.usuario);
                        sessionStorage.setItem('usrName', found.nombre);
                        sessionStorage.setItem('usuario_nombre', `${found.nombre} ${found.apellido}`);
                        sessionStorage.setItem('usrPermiso', found.permiso);

                        showNotify(`¡Hola ${found.nombre}! Entrando...`, 'success');

                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1500);
                    } else {
                        showError("Acceso restringido. Solo cuentas de Gestión.");
                    }
                } else {
                    showError("Usuario o contraseña incorrectos.");
                }

            } catch (err) {
                console.error(err);
                showError("Error de conexión. Reintente.");
            } finally {
                setLoading(false);
            }
        });

        function setLoading(status) {
            loginBtn.disabled = status;
            btnText.style.display = status ? "none" : "block";
            loader.style.display = status ? "flex" : "none";
        }

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = "block";
        }

        function showNotify(msg, type = 'info') {
            const div = document.createElement('div');
            div.className = 'stm-notify';
            const ico = type === 'error' ? 'fa-triangle-exclamation' : 'fa-check';
            const bg = type === 'error' ? '#ef4444' : '#10b981';
            div.innerHTML = `<i class="fa-solid ${ico}" style="background:${bg}"></i> <span style="font-weight:700; font-size:0.9rem">${msg}</span>`;
            document.body.appendChild(div);
            setTimeout(() => div.classList.add('show'), 10);
            setTimeout(() => {
                div.classList.remove('show');
                setTimeout(() => div.remove(), 500);
            }, 3000);
        }

    </script>
    <script src="stm-bot.js"></script>
</body>

</html>
